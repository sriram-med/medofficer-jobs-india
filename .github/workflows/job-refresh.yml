name: Auto Refresh Govt Jobs

on:
  schedule:
    # Every 15 minutes, offset from :00/:15/:30/:45
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: govt-job-refresh
  cancel-in-progress: false

jobs:
  refresh-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run backend refresh worker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_SSL: ${{ secrets.DB_SSL }}
        run: node backend/src/refresh/runAll.js

      - name: Upload refresh run summary
        uses: actions/upload-artifact@v4
        with:
          name: refresh-run-summary
          path: artifacts/refresh-summary.json
          if-no-files-found: error

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/ public/data/ || true

          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "Auto-update govt jobs data"
          git push
