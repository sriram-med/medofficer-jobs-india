<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedOfficer Jobs</title>
  <meta name="description" content="Latest government medical officer jobs in India." />
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blur: 24px;
      --glass: rgba(255,255,255,0.18);
      --glass-border: rgba(255,255,255,0.35);
      --glass-hover: rgba(255,255,255,0.28);
      --text: #1a1a2e;
      --text2: #4a4a6a;
      --muted: rgba(100,100,130,0.7);
      --accent: #007aff;
      --accent2: #34aadc;
      --new: #ff9f0a;
      --success: #30d158;
      --radius: 20px;
      --radius-sm: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

    body {
      font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: #e8f0ff;
      overflow-x: hidden;
    }

    /* ── ANIMATED BACKGROUND ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.6;
      animation: float linear infinite;
    }

    .blob1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #a8d8ff, #6ab4ff);
      top: -100px; left: -100px;
      animation-duration: 20s;
    }

    .blob2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #b8e6ff, #89d4ff);
      top: 30%; right: -80px;
      animation-duration: 25s;
      animation-delay: -8s;
    }

    .blob3 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, #c5f0ff, #a0deff);
      bottom: 10%; left: 20%;
      animation-duration: 18s;
      animation-delay: -4s;
    }

    .blob4 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #ddf4ff, #b5e8ff);
      bottom: 30%; right: 10%;
      animation-duration: 22s;
      animation-delay: -12s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -20px) scale(1.05); }
      50% { transform: translate(-20px, 30px) scale(0.95); }
      75% { transform: translate(20px, 20px) scale(1.02); }
    }

    /* ── GLASS MIXIN ── */
    .glass {
      background: var(--glass);
      backdrop-filter: blur(var(--blur)) saturate(180%);
      -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
      border: 1px solid var(--glass-border);
    }

    /* ── LAYOUT ── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 16px 40px;
    }

    /* ── HEADER ── */
    .header {
      padding: 52px 0 24px;
      text-align: center;
      animation: fadeDown 0.7s cubic-bezier(0.34, 1.4, 0.64, 1) both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.5));
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow: 0 8px 32px rgba(0,122,255,0.15), inset 0 1px 0 rgba(255,255,255,0.8);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }

    .logo-title {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #007aff, #34aadc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .header-sub {
      font-size: 0.88rem;
      color: var(--text2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(48, 209, 88, 0.15);
      border: 1px solid rgba(48, 209, 88, 0.3);
      color: #1a7a3a;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
    }

    .live-dot {
      width: 6px; height: 6px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.4); }
    }

    /* ── NEW JOBS ALERT ── */
    .alert-bar {
      margin-bottom: 16px;
      display: none;
      animation: slideIn 0.5s cubic-bezier(0.34, 1.4, 0.64, 1) both;
    }

    .alert-bar.show { display: block; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .alert-inner {
      background: rgba(255, 159, 10, 0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 159, 10, 0.35);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .alert-text { font-size: 0.88rem; font-weight: 500; color: #7a4a00; }

    .alert-btn {
      background: var(--new);
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .alert-btn:hover { transform: scale(1.05); }

    /* ── STATS ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .stat {
      glass: var(--glass);
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: var(--radius-sm);
      padding: 14px 12px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.8);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .stat:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }

    .stat-num {
      font-size: 1.7rem;
      font-weight: 700;
      background: linear-gradient(135deg, #007aff, #34aadc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 3px;
    }

    .stat-label { font-size: 0.72rem; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; }

    /* ── SEARCH ── */
    .search-wrap {
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.9);
      animation: fadeUp 0.6s ease 0.2s both;
    }

    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .search-input {
      flex: 1;
      background: rgba(255,255,255,0.7);
      border: 1.5px solid rgba(255,255,255,0.8);
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      transition: all 0.25s;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.04);
    }

    .search-input::placeholder { color: var(--muted); }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(255,255,255,0.95);
      box-shadow: 0 0 0 3px rgba(0,122,255,0.12), inset 0 2px 8px rgba(0,0,0,0.02);
    }

    .refresh-btn {
      background: linear-gradient(135deg, #007aff, #34aadc);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 11px 18px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(0,122,255,0.3);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .refresh-btn:hover { transform: scale(1.03); box-shadow: 0 6px 16px rgba(0,122,255,0.4); }
    .refresh-btn:active { transform: scale(0.97); }
    .refresh-btn.spinning .ri { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .filter-pills {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    .pill {
      background: rgba(255,255,255,0.6);
      border: 1.5px solid rgba(255,255,255,0.8);
      color: var(--text2);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }

    .pill:hover { background: rgba(0,122,255,0.08); border-color: rgba(0,122,255,0.3); color: var(--accent); }

    .pill.active {
      background: linear-gradient(135deg, #007aff, #34aadc);
      border-color: transparent;
      color: white;
      box-shadow: 0 4px 12px rgba(0,122,255,0.3);
    }

    /* ── COUNT LINE ── */
    .count-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 12px;
      padding: 0 4px;
      animation: fadeUp 0.6s ease 0.3s both;
    }

    /* ── JOB CARDS ── */
    .jobs { display: grid; gap: 10px; }

    .job-card {
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.9);
      transition: transform 0.3s cubic-bezier(0.34, 1.3, 0.64, 1), box-shadow 0.3s ease, border-color 0.2s;
      animation: cardIn 0.5s cubic-bezier(0.34, 1.2, 0.64, 1) both;
      cursor: default;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .job-card:hover {
      transform: translateY(-4px) scale(1.005);
      box-shadow: 0 12px 36px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.95);
      border-color: rgba(0,122,255,0.2);
    }

    .job-card.fresh {
      border-color: rgba(255,159,10,0.4);
      background: rgba(255,249,235,0.65);
    }

    .job-card.fresh:hover { border-color: rgba(255,159,10,0.6); }

    .job-title {
      font-size: 0.97rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.45;
      margin-bottom: 10px;
    }

    .job-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .chip {
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 999px;
      font-weight: 500;
      border: 1px solid transparent;
      backdrop-filter: blur(8px);
    }

    .chip-blue { background: rgba(0,122,255,0.1); color: #0055b3; border-color: rgba(0,122,255,0.2); }
    .chip-green { background: rgba(48,209,88,0.12); color: #1a6a30; border-color: rgba(48,209,88,0.25); }
    .chip-orange { background: rgba(255,159,10,0.12); color: #7a4a00; border-color: rgba(255,159,10,0.3); }
    .chip-purple { background: rgba(175,82,222,0.1); color: #5a0080; border-color: rgba(175,82,222,0.2); }

    .job-detail { font-size: 0.82rem; color: var(--text2); margin-bottom: 3px; }

    .time-ago { font-size: 0.73rem; color: var(--muted); margin-top: 6px; }

    .view-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      background: linear-gradient(135deg, #007aff, #34aadc);
      color: white;
      padding: 9px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 0.83rem;
      font-weight: 600;
      transition: all 0.25s;
      box-shadow: 0 4px 12px rgba(0,122,255,0.25);
    }

    .view-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(0,122,255,0.4);
    }

    .view-btn svg { transition: transform 0.2s; }
    .view-btn:hover svg { transform: translateX(3px); }

    /* ── EMPTY / LOADING ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .spinner {
      width: 34px; height: 34px;
      border: 2.5px solid rgba(0,122,255,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 14px;
    }

    @media (max-width: 480px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .stat:nth-child(3) { grid-column: span 2; }
      .search-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="bg">
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>
  <div class="bg-blob blob4"></div>
</div>

<div class="page">

  <div class="header">
    <div class="logo-wrap">
      <div class="logo-icon">🏥</div>
      <div class="logo-title">MedOfficer Jobs</div>
    </div>
    <div class="header-sub">
      Government medical officer jobs in India &nbsp;
      <span class="live-pill"><span class="live-dot"></span> Live</span>
    </div>
  </div>

  <div class="alert-bar" id="alertBar">
    <div class="alert-inner">
      <div class="alert-text" id="alertText">New jobs available!</div>
      <button class="alert-btn" onclick="reloadJobs()">View Now</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="totalStat">—</div>
      <div class="stat-label">Active Jobs</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="todayStat">—</div>
      <div class="stat-label">Added Today</div>
    </div>
    <div class="stat">
      <div class="stat-num">4</div>
      <div class="stat-label">Sources</div>
    </div>
  </div>

  <div class="search-wrap">
    <div class="search-row">
      <input class="search-input" id="query" type="text" placeholder="Search jobs, hospitals, states..." oninput="filterJobs()" />
      <button class="refresh-btn" id="refreshBtn" onclick="reloadJobs()">
        <svg class="ri" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
        Refresh
      </button>
    </div>
    <div class="filter-pills" id="filterPills">
      <button class="pill active" onclick="setFilter('', this)">All</button>
      <button class="pill" onclick="setFilter('apcareers.in', this)">AP Careers</button>
      <button class="pill" onclick="setFilter('freshersgroup.in', this)">FreshersGroup</button>
      <button class="pill" onclick="setFilter('jobstail.com', this)">JobsTail</button>
      <button class="pill" onclick="setFilter('freejobalert.com', this)">FreeJobAlert</button>
      <button class="pill" onclick="setFilter('manual', this)">Manual</button>
    </div>
  </div>

  <div class="count-line">
    <span id="countText"></span>
    <span id="updatedAt"></span>
  </div>

  <div class="jobs" id="jobsList">
    <div class="empty">
      <div class="spinner"></div>
      Loading latest jobs…
    </div>
  </div>

</div>

<script>
  const SB_URL = 'https://qgcpbabcxlyuxfuezipm.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFnY3BiYWJjeGx5dXhmdWV6aXBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NTA3NTAsImV4cCI6MjA5MjQyNjc1MH0.fy7tKDnrfhDjh4iLzPjFvzdd_jLvDV0M4CVppaXu3kU';

  let allJobs = [], activeFilter = '', lastCount = 0;

  const esc = v => String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const isFresh = d => d && (Date.now()-new Date(d).getTime()) < 24*3600000;
  const isToday = d => d && new Date(d).toDateString()===new Date().toDateString();
  const ago = d => {
    if (!d) return '';
    const m = (Date.now()-new Date(d).getTime())/60000;
    if (m<60) return `${Math.floor(m)}m ago`;
    if (m<1440) return `${Math.floor(m/60)}h ago`;
    return `${Math.floor(m/1440)}d ago`;
  };

  function card(job, i) {
    const fresh = isFresh(job.created_at);
    return `<div class="job-card${fresh?' fresh':''}" style="animation-delay:${Math.min(i*0.045,0.6)}s">
      <div class="job-title">${esc(job.title)}</div>
      <div class="job-chips">
        <span class="chip chip-blue">${esc(job.job_type||'Government')}</span>
        ${job.source_site?`<span class="chip chip-green">${esc(job.source_site)}</span>`:''}
        ${job.location?`<span class="chip chip-purple">📍 ${esc(job.location)}</span>`:''}
        ${job.state?`<span class="chip chip-purple">${esc(job.state)}</span>`:''}
        ${fresh?'<span class="chip chip-orange">🆕 New</span>':''}
      </div>
      ${job.organization?`<div class="job-detail">🏢 ${esc(job.organization)}</div>`:''}
      ${job.deadline?`<div class="job-detail">📅 Last date: ${esc(job.deadline)}</div>`:''}
      ${job.vacancies?`<div class="job-detail">👥 ${esc(job.vacancies)} vacancies</div>`:''}
      <div class="time-ago">${ago(job.created_at)}</div>
      ${job.apply_url?`<a href="${esc(job.apply_url)}" target="_blank" class="view-btn">View Job <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></a>`:''}
    </div>`;
  }

  async function loadJobs(silent=false) {
    if (!silent) document.getElementById('jobsList').innerHTML='<div class="empty"><div class="spinner"></div>Loading latest jobs…</div>';
    const btn=document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    try {
      const res=await fetch(`${SB_URL}/rest/v1/jobs?select=*&is_active=eq.true&order=created_at.desc&limit=500`,
        {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
      const jobs=await res.json();
      if (silent && jobs.length>lastCount) {
        const d=jobs.length-lastCount;
        document.getElementById('alertText').textContent=`${d} new job${d>1?'s':''} just added!`;
        document.getElementById('alertBar').classList.add('show');
      }
      allJobs=jobs; lastCount=jobs.length;
      document.getElementById('totalStat').textContent=jobs.length;
      document.getElementById('todayStat').textContent=jobs.filter(j=>isToday(j.created_at)).length;
      document.getElementById('updatedAt').textContent='Updated '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
      filterJobs();
    } catch(e) {
      if (!silent) document.getElementById('jobsList').innerHTML='<div class="empty">Unable to load. Tap Refresh.</div>';
    }
    btn.classList.remove('spinning');
  }

  function reloadJobs() {
    document.getElementById('alertBar').classList.remove('show');
    loadJobs(false);
  }

  function setFilter(src, el) {
    activeFilter=src;
    document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
    el.classList.add('active');
    filterJobs();
  }

  function filterJobs() {
    const q=document.getEl
