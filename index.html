<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedOfficer Jobs — Minimal</title>
  <meta name="description" content="Minimal and clean listing page for verified government medical officer jobs in India." />
  <style>
    :root {
      --bg: #f7f8fa;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #0f766e;
      --primary-soft: #ecfeff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container { max-width: 900px; margin: 0 auto; padding: 20px; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    h1 { font-size: 1.35rem; margin: 0; }
    .meta { color: var(--muted); font-size: 0.9rem; }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-bottom: 16px;
    }

    input, button {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.95rem;
    }

    input:focus {
      outline: 2px solid #99f6e4;
      border-color: var(--primary);
    }

    button {
      background: var(--primary);
      color: white;
      cursor: pointer;
      border-color: var(--primary);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
    }

    .stat strong { display: block; font-size: 1.1rem; }
    .stat span { color: var(--muted); font-size: 0.82rem; }

    .list {
      display: grid;
      gap: 10px;
    }

    .job {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
    }

    .job h2 {
      margin: 0 0 6px 0;
      font-size: 1rem;
      line-height: 1.35;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .tag {
      font-size: 0.78rem;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fafafa;
      color: #374151;
    }

    .verified {
      background: var(--primary-soft);
      border-color: #a7f3d0;
      color: #065f46;
    }

    .muted { color: var(--muted); font-size: 0.85rem; }
    .empty { text-align: center; color: var(--muted); padding: 20px; }

    @media (max-width: 640px) {
      .stats { grid-template-columns: 1fr; }
      .toolbar { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="container">
    <header>
      <div>
        <h1>MedOfficer Jobs</h1>
        <div class="meta">Minimal design • verified government medical officer listings</div>
      </div>
    </header>

    <section class="toolbar">
      <input id="query" type="text" placeholder="Search title, state, organization..." onkeydown="if(event.key==='Enter') loadJobs()" />
      <button onclick="loadJobs()">Search</button>
    </section>

    <section class="stats">
      <article class="stat"><strong id="active">-</strong><span>Active jobs</span></article>
      <article class="stat"><strong id="posted">-</strong><span>Posted this week</span></article>
      <article class="stat"><strong id="closing">-</strong><span>Closing this week</span></article>
    </section>

    <section id="jobs" class="list">
      <div class="empty">Loading jobs…</div>
    </section>
  </main>

  <script>
    const API = 'https://medofficer-jobs-india-production.up.railway.app';

    const esc = (v) => String(v ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    function formatDate(dateValue) {
      if (!dateValue) return 'Date TBD';
      const d = new Date(dateValue);
      if (Number.isNaN(d.getTime())) return esc(dateValue);
      return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function card(job) {
      return `
        <article class="job">
          <h2>${esc(job.title)}</h2>
          <div class="tags">
            <span class="tag">${esc(job.org_type || 'GOVT')}</span>
            <span class="tag">${esc(job.job_type || 'MO')}</span>
            <span class="tag">${esc(job.location_state || 'India')}</span>
            ${job.is_verified ? '<span class="tag verified">Verified</span>' : ''}
          </div>
          <div class="muted">${esc(job.org_name || 'Government Organization')}</div>
          <div class="muted">Last date: ${formatDate(job.last_date)}</div>
        </article>
      `;
    }

    async function loadStats() {
      try {
        const res = await fetch(`${API}/api/jobs/stats`);
        if (!res.ok) throw new Error('stats fetch failed');
        const stats = await res.json();
        document.getElementById('active').textContent = (stats.total_active || 0).toLocaleString('en-IN');
        document.getElementById('posted').textContent = String(stats.posted_this_week || 0);
        document.getElementById('closing').textContent = String(stats.closing_this_week || 0);
      } catch {
        document.getElementById('active').textContent = '500+';
        document.getElementById('posted').textContent = '40+';
        document.getElementById('closing').textContent = '15+';
      }
    }

    async function loadJobs() {
      const list = document.getElementById('jobs');
      const q = document.getElementById('query').value.trim();
      list.innerHTML = '<div class="empty">Loading jobs…</div>';

      try {
        const url = new URL(`${API}/api/jobs`);
        url.searchParams.set('limit', '15');
        if (q) url.searchParams.set('search', q);

        const res = await fetch(url.toString());
        if (!res.ok) throw new Error('jobs fetch failed');
        const data = await res.json();

        if (!data.jobs || data.jobs.length === 0) {
          list.innerHTML = '<div class="empty">No jobs found.</div>';
          return;
        }

        list.innerHTML = data.jobs.map(card).join('');
      } catch {
        list.innerHTML = '<div class="empty">Unable to load jobs right now.</div>';
      }
    }

    loadStats();
    loadJobs();
  </script>
</body>
</html>
